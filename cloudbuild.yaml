substitutions:
  _REGION: "us-west2"
  _REPOSITORY: "npm-repository"

steps:
  - name: "node:25-alpine"
    id: "prepare"
    entrypoint: npm
    args: ["ci"]

  - name: "node:25-alpine"
    id: "testing"
    entrypoint: npm
    args: ["test"]

  - name: "node:25-alpine"
    id: "audit"
    entrypoint: npm
    args: ["audit", "--audit-level=high"]

  - name: "node:25-alpine"
    id: "publish"
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        REGISTRY_URL="https://${_REGION}-npm.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/"
        AUTH_TOKEN=$(gcloud auth print-access-token)
        REGISTRY_PATH="${$$REGISTRY_URL#https:}"

        printf '@prom-client:registry=%s\n' "$$REGISTRY_URL" > .npmrc
        printf '%s:_authToken=%s\n' "$$REGISTRY_PATH" "$$AUTH_TOKEN" >> .npmrc
        printf 'always-auth=true\n' >> .npmrc

        npm publish --access restricted
