substitutions:
  _REGION: "us-west2"
  _REPOSITORY: "npm-repository"

steps:
  - name: "node:25-alpine"
    id: "prepare"
    entrypoint: npm
    args: ["ci", "--ignore-scripts"]

  - name: "node:25-alpine"
    id: "testing"
    entrypoint: npm
    args: ["test"]

  - name: "node:25-alpine"
    id: "audit"
    entrypoint: npm
    args: ["audit", "--audit-level=high"]

  - name: "gcr.io/cloud-builders/gcloud"
    id: "get-token"
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud auth print-access-token > /workspace/auth_token

  - name: "node:25-alpine"
    id: "publish"
    entrypoint: sh
    args:
      - -c
      - |
        set -eu
        REGISTRY_URL="https://${_REGION}-npm.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/"
        REGISTRY_PATH="${$$REGISTRY_URL#https:}"

        printf '@prom-client:registry=%s\n' "$$REGISTRY_URL" > .npmrc
        printf '%s:_authToken=%s\n' "$$REGISTRY_PATH" "$(cat /workspace/auth_token)" >> .npmrc
        printf 'always-auth=true\n' >> .npmrc

        npm publish --access restricted
